name: Build Android APK
on: [push]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Setup Java
        uses: actions/setup-java@v3
        with:
          distribution: 'zulu'
          java-version: '11'

      - name: Build APK using Bubblewrap
        run: |
          npm install -g @bubblewrap/cli
          # إنشاء الإعدادات تلقائياً لضمان النجاح
          yes | bubblewrap init --manifest=manifest.json
          bubblewrap build --skipConfig
        
      - name: Upload APK
        uses: actions/upload-artifact@v3
        with:
          name: Gold-App-Final
          path: ./*.apk

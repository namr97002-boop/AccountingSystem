name: Build-APK

on:
  push:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
      - uses: android-actions/setup-android@v3
      - run: mkdir -p app/src/main/assets app/src/main/java/com/sulaiman/store
      - run: cp index.html app/src/main/assets/
      - run: |
          cat > build.gradle << 'EOF'
          plugins { id 'com.android.application' version '8.2.0' apply false }
          EOF
      - run: |
          cat > settings.gradle << 'EOF'
          rootProject.name = "Store"
          include ':app'
          EOF
      - run: |
          cat > app/build.gradle << 'EOF'
          plugins { id 'com.android.application' }
          android { namespace 'com.sulaiman.store' ; compileSdk 34 ; defaultConfig { applicationId "com.sulaiman.store" ; minSdk 21 ; targetSdk 34 ; versionCode 1 ; versionName "1.0" } }
          dependencies { implementation 'androidx.appcompat:appcompat:1.7.0' }
          EOF
      - run: |
          cat > app/src/main/AndroidManifest.xml << 'EOF'
          <?xml version="1.0" encoding="utf-8"?>
          <manifest xmlns:android="http://schemas.android.com/apk/res/android">
          <uses-permission android:name="android.permission.INTERNET"/>
          <application android:allowBackup="true" android:label="محلات للتجارة العامة" android:theme="@android:style/Theme.NoTitleBar.Fullscreen">
          <activity android:name=".MainActivity" android:exported="true">
          <intent-filter><action android:name="android.intent.action.MAIN"/><category android:name="android.intent.category.LAUNCHER"/></intent-filter>
          </activity>
          </application>
          </manifest>
          EOF
      - run: |
          cat > app/src/main/java/com/sulaiman/store/MainActivity.java << 'EOF'
          package com.sulaiman.store;
          import android.app.Activity;
          import android.os.Bundle;
          import android.webkit.WebSettings;
          import android.webkit.WebView;
          public class MainActivity extends Activity {
              @Override
              protected void onCreate(Bundle b) {
                  super.onCreate(b);
                  WebView w = new WebView(this);
                  WebSettings s = w.getSettings();
                  s.setJavaScriptEnabled(true);
                  s.setDomStorageEnabled(true);
                  s.setDatabaseEnabled(true);
                  s.setAllowFileAccess(true);
                  w.loadUrl("file:///android_asset/index.html");
                  setContentView(w);
              }
          }
          EOF
      - run: ./gradlew assembleDebug
      - uses: actions/upload-artifact@v4
        with:
          name: Sulaiman-APK
          path: app/build/outputs/apk/debug/app-debug.apk
